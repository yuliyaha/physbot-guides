<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full schedule — Normal Physiology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --bg-muted: #eeece7;
    --border: #ddd9d0;
    --border-light: #e8e5de;
    --ink: #1a1916;
    --ink-2: #4a4740;
    --ink-3: #8a8680;
    --accent: #2d5a8e;
    --accent-light: #e8eef6;
    --accent-muted: #c8d8ed;
    --tag-eng: #2d5a8e;
    --tag-eng-bg: #dde8f5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;padding:14px 12px 60px}
  h1{font-family:'Lora',serif;font-size:26px;font-weight:700;color:var(--accent);margin-bottom:6px}
  .subt{font-size:15px;font-weight:600;color:var(--ink-2);margin-bottom:14px}

  .filters{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:14px}
  .filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .filter-row:last-child{margin-bottom:0}
  .filter-row label{font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
  .filter-col{flex:1;min-width:140px}
  select,input{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;font-size:13.5px;color:var(--ink)}
  select:focus,input:focus{outline:none;border-color:var(--accent)}
  .reset-btn{padding:8px 14px;background:var(--bg-muted);border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--ink-2);cursor:pointer;width:100%}
  .reset-btn:active{background:var(--border-light)}
  .stat{font-size:12px;color:var(--ink-3);margin:10px 2px 12px}
  .stat b{color:var(--accent);font-weight:600}

  .tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;padding:8px 14px;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:7px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s}
  .tab:active{transform:scale(.97)}
  .tab.active{background:#fff;color:var(--accent);border-color:var(--accent-muted);font-weight:600}
  .tab .tab-cnt{font-size:11px;background:rgba(255,255,255,.25);color:#fff;padding:1px 6px;border-radius:9px;min-width:18px;text-align:center}
  .tab.active .tab-cnt{background:var(--accent-light);color:var(--accent)}

  .row{background:#fff;border:1px solid var(--border-light);border-radius:7px;padding:8px 10px;margin-bottom:5px;display:grid;grid-template-columns:62px 1fr;gap:8px;align-items:center}
  .row-time{font-family:'Lora',serif;font-size:13px;color:var(--accent);font-weight:600;line-height:1.2}
  .row-time small{display:block;font-size:11px;color:var(--ink-3);font-weight:400;font-family:'Onest',sans-serif}
  .row-main{display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline}
  .grp{font-weight:600;color:var(--ink);font-size:14px}
  .grp.eng{background:var(--tag-eng-bg);color:var(--tag-eng);padding:1px 6px;border-radius:4px;font-size:13px}
  .tch{color:var(--ink-2);font-size:13px}
  .rm{color:var(--ink-3);font-size:12px;margin-left:auto}
  .rm::before{content:"room "}
  .fac{font-size:11px;color:var(--ink-3);width:100%;margin-top:1px}

  .empty{text-align:center;padding:40px 20px;color:var(--ink-3);font-style:italic}
  .footer{text-align:center;color:var(--ink-3);font-size:11px;margin-top:24px}
</style>
</head>
<body>

<h1>Full schedule</h1>
<div class="subt">Practical classes · spring semester 2025/2026</div>

<div class="filters">
  <div class="filter-row">
    <div class="filter-col">
      <label>Faculty</label>
      <select id="f-fac"><option value="">All</option></select>
    </div>
    <div class="filter-col">
      <label>Course</label>
      <select id="f-crs"><option value="">All</option></select>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-col">
      <label>Group</label>
      <input id="f-grp" type="text" placeholder="e.g. 1217">
    </div>
    <div class="filter-col">
      <label>Teacher</label>
      <input id="f-tch" type="text" placeholder="e.g. Haikovich">
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-col"><button class="reset-btn" onclick="resetFilters()">Reset filters</button></div>
  </div>
</div>

<div class="stat" id="stat"></div>
<div class="tabs" id="tabs"></div>
<div id="content"></div>
<div class="footer">Department of Normal Physiology, BSMU</div>

ry (International)", "crs": 1, "lang": "RU", "grp": "6142", "day": "Friday", "t1": "15:30", "t2": "17:45", "tch": "Korniyenko E.M.O.", "tchF": "Корниенко Елизавета Маргарита Олеговна", "rm": "102"}];
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri'];
let activeDay = 'Monday';

function initFilters(){
  const facs = [...new Set(DATA.map(r=>r.fac).filter(x=>x))].sort();
  const fEl = document.getElementById('f-fac');
  facs.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fEl.appendChild(o);});
  const crs = [...new Set(DATA.map(r=>r.crs).filter(x=>x))].sort();
  const cEl = document.getElementById('f-crs');
  crs.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c+' year';cEl.appendChild(o);});
}

function norm(s){return (s||'').toString().toLowerCase().trim();}

function getFilteredRows(){
  const fac = document.getElementById('f-fac').value;
  const crs = document.getElementById('f-crs').value;
  const grp = norm(document.getElementById('f-grp').value);
  const tch = norm(document.getElementById('f-tch').value);
  return DATA.filter(r=>{
    if(fac && r.fac !== fac) return false;
    if(crs && String(r.crs) !== crs) return false;
    if(grp && !norm(r.grp).includes(grp)) return false;
    if(tch && !(norm(r.tch).includes(tch) || norm(r.tchF).includes(tch))) return false;
    return true;
  });
}

function renderTabs(rows){
  const t = document.getElementById('tabs');
  t.innerHTML = '';
  DAYS.forEach((day,i)=>{
    const cnt = rows.filter(r=>r.day===day).length;
    const btn = document.createElement('button');
    btn.className = 'tab' + (day===activeDay?' active':'');
    btn.innerHTML = DAYS_SHORT[i] + ' <span class="tab-cnt">'+cnt+'</span>';
    btn.onclick = ()=>{activeDay = day; render();};
    t.appendChild(btn);
  });
}

function render(){
  const rows = getFilteredRows();
  document.getElementById('stat').innerHTML = 'Found: <b>'+rows.length+'</b> classes';
  renderTabs(rows);

  const dayRows = rows.filter(r=>r.day===activeDay);
  dayRows.sort((a,b)=>(a.t1||'').localeCompare(b.t1||''));

  const c = document.getElementById('content');
  c.innerHTML = '';
  if(dayRows.length === 0){c.innerHTML = '<div class="empty">No classes for selected filters on '+activeDay+'</div>';return;}

  dayRows.forEach(r=>{
    const isEng = r.lang === 'EN';
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML =
      '<div class="row-time">'+(r.t1||'')+'<small>'+(r.t2||'')+'</small></div>'+
      '<div class="row-main">'+
        '<span class="grp '+(isEng?'eng':'')+'">'+(r.grp||'—')+'</span>'+
        '<span class="tch">'+(r.tch||'—')+'</span>'+
        '<span class="rm">'+(r.rm||'—')+'</span>'+
        '<span class="fac">'+(r.fac||'')+(r.crs?' · year '+r.crs:'')+'</span>'+
      '</div>';
    c.appendChild(div);
  });
}

function resetFilters(){
  document.getElementById('f-fac').value='';
  document.getElementById('f-crs').value='';
  document.getElementById('f-grp').value='';
  document.getElementById('f-tch').value='';
  render();
}

initFilters();
['f-fac','f-crs','f-grp','f-tch'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});
render();
</script>
