<style>

    --tag-eng: #2d5a8e; --tag-eng-bg: #dde8f5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;padding:14px 12px 60px}
  h1{font-family:'Lora',serif;font-size:26px;font-weight:700;color:var(--accent);margin-bottom:6px}
  .subt{font-size:15px;font-weight:600;color:var(--ink-2);margin-bottom:14px}

  .filters{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:14px}
  .filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .filter-row:last-child{margin-bottom:0}
  .filter-row label{font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
  .filter-col{flex:1;min-width:140px}
  input{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;font-size:13.5px;color:var(--ink)}
  input:focus{outline:none;border-color:var(--accent)}
  .reset-btn{padding:8px 14px;background:var(--bg-muted);border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--ink-2);cursor:pointer;width:100%}
  .reset-btn:active{background:var(--border-light)}
  .stat{font-size:12px;color:var(--ink-3);margin:10px 2px 12px}
  .stat b{color:var(--accent);font-weight:600}

  .tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .tab{flex:0 0 auto;padding:8px 14px;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:7px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s}
  .tab:active{transform:scale(.97)}
  .tab.active{background:#fff;color:var(--accent);border-color:var(--accent-muted);font-weight:600}
  .tab .tab-cnt{font-size:11px;background:rgba(255,255,255,.25);color:#fff;padding:1px 6px;border-radius:9px;min-width:18px;text-align:center}
  .tab.active .tab-cnt{background:var(--accent-light);color:var(--accent)}

  .row{background:#fff;border:1px solid var(--border-light);border-radius:7px;padding:8px 10px;margin-bottom:5px;display:grid;grid-template-columns:88px 1fr;gap:8px;align-items:center}
  .row-time{font-family:'Lora',serif;font-size:13px;color:var(--accent);font-weight:600;line-height:1.2}
  .row-main{display:flex;flex-wrap:wrap;gap:4px 10px;align-items:baseline}
  .grp{font-weight:600;color:var(--ink);font-size:14px}
  .grp.eng{background:var(--tag-eng-bg);color:var(--tag-eng);padding:1px 6px;border-radius:4px;font-size:13px}
  .tch{color:var(--ink);font-size:15px;font-weight:600}

  .empty{text-align:center;padding:40px 20px;color:var(--ink-3);font-style:italic}
  .footer{text-align:center;color:var(--ink-3);font-size:11px;margin-top:24px}
</style>
</head>

let activeDay = 'Понедельник';

function norm(s){return (s||'').toString().toLowerCase().trim();}

function getFilteredRows(){
  const grp = norm(document.getElementById('f-grp').value);
  const tch = norm(document.getElementById('f-tch').value);
  return DATA.filter(r=>{
    if(grp && !norm(r.grp).includes(grp)) return false;
    if(tch && !norm(r.tch).includes(tch)) return false;
    return true;
  });
}

function renderTabs(rows){
  const t = document.getElementById('tabs');
  t.innerHTML = '';
  DAYS.forEach((day,i)=>{
    const cnt = rows.filter(r=>r.day===day).length;
    const btn = document.createElement('button');
    btn.className = 'tab' + (day===activeDay?' active':'');
    btn.innerHTML = DAYS_SHORT[i] + ' <span class="tab-cnt">'+cnt+'</span>';
    btn.onclick = ()=>{activeDay = day; render();};
    t.appendChild(btn);
  });
}

function render(){
  const rows = getFilteredRows();
  document.getElementById('stat').innerHTML = 'Найдено: <b>'+rows.length+'</b> записей';
  renderTabs(rows);

  const dayRows = rows.filter(r=>r.day===activeDay);
  dayRows.sort((a,b)=>(a.t1||'').localeCompare(b.t1||''));

  const c = document.getElementById('content');
  c.innerHTML = '';
  if(dayRows.length === 0){c.innerHTML = '<div class="empty">В '+activeDay.toLowerCase()+' записей по фильтру нет</div>';return;}

  dayRows.forEach(r=>{
    const isEng = /ая/.test(r.grp);
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML =
      '<div class="row-time">'+(r.t1||'')+' – '+(r.t2||'')+'</div>'+
      '<div class="row-main">'+
        '<span class="grp '+(isEng?'eng':'')+'">'+(r.grp||'—')+'</span>'+
        '<span class="tch">'+(r.tch||'—')+'</span>'+
      '</div>';
    c.appendChild(div);
  });
}

function resetFilters(){
  document.getElementById('f-grp').value='';
  document.getElementById('f-tch').value='';
  render();
}

['f-grp','f-tch'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
});
render();
</script>
</body>
</html>
